site_name: PIDL
site_description: Protocol Interaction Description Language - A JSON-based DSL for describing protocol choreography
site_url: https://grokify.github.io/pidl/
repo_url: https://github.com/grokify/pidl
repo_name: grokify/pidl

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.integrate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quick-start.md
  - Guide:
    - PIDL Format: guide/format.md
    - Entities: guide/entities.md
    - Flows: guide/flows.md
    - Phases: guide/phases.md
    - Annotations: guide/annotations.md
    - Alternatives: guide/alternatives.md
  - Reference:
    - Specification: SPECIFICATION.md
    - CLI Reference: reference/cli.md
    - Go Library: reference/library.md
  - Examples:
    - Overview: examples/index.md
    - OAuth 2.0: examples/oauth2.md
    - MCP: examples/mcp.md
    - A2A: examples/a2a.md
  - Releases:
    - Overview: releases/index.md
    - v0.2.0: releases/v0.2.0.md
    - v0.1.0: releases/v0.1.0.md
  - Changelog: CHANGELOG.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/grokify/pidl

plugins:
  - search
